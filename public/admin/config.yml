# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

backend:
  name: sveltia CMS
  repo: xuedesign/sveltia-test.2026
  branch: master

media_folder: /public/media
public_folder: /media

collections:
  - name: posts
    label: Posts
    label_singular: Post
    folder: /content/posts
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime, type: date }
      - { label: Body, name: body, widget: richtext }

  - name: products
    label: 產品
    label_singular: 產品
    files:
      - name: product_list
        label: 產品列表
        file: content/products.json    # 對應你現有的產品 JSON
        fields:
          - label: 產品項目
            name: items
            widget: list
            fields:
              - { label: 名稱, name: name, widget: string }
              - { label: 圖片, name: image, widget: image }
              - { label: 說明, name: description, widget: text }
